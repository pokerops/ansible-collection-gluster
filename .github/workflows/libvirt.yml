---
name: molecule
on:
  pull_request:
    branches:
      - master
    paths:
      - "molecule/**"
      - "playbooks/**"
      - "plugins/**"
      - "requirements.yml"
      - "roles.yml"
      - "roles/gluster/**"
      - "Makefile"
      - "pyproject.toml"
      - "poetry.lock"
      - "devbox.json"
      - "devbox.lock"
      - .github/workflows/libvirt.yml
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  molecule:
    name: libvirt
    runs-on: libvirt
    strategy:
      matrix:
        scenario:
          - install
          - start
          - stop
          - restart
          - scaleup
          - scaledown
          - update
          - georeplication
        image:
          - https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img
    steps:
      - name: Run devbox tests
        uses: pokerops/ansible-utils@master
        with:
          run: >
            just
            --set MOLECULE_SCENARIO ${{ matrix.scenario }}
            --set MOLECULE_KVM_IMAGE ${{ matrix.image }}
            requirements test
      - name: Upload install logs
        uses: actions/upload-artifact@v4
        with:
          name: install.${{ matrix.image.distro }}
          path: |
            ${{ env.MOLECULE_LOGDIR }}/*.log
          if-no-files-found: ignore
        if: always()
